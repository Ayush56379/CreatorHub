<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Seller Control</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin-bottom:15px;
}

button{
border:none;
padding:10px 14px;
border-radius:8px;
color:white;
cursor:pointer;
margin-right:6px;
margin-top:6px;
}

.ban{background:#ef4444;}
.unban{background:#22c55e;}
.approve{background:#22c55e;}
.reject{background:#f59e0b;}

.status-active{
color:#22c55e;
font-weight:bold;
}

.status-banned{
color:#ef4444;
font-weight:bold;
}

.status-seller{
color:#38bdf8;
font-weight:bold;
}

.status-request{
color:#f59e0b;
font-weight:bold;
}

</style>

</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">Seller Control Panel</div>
</div>

<div class="container">

<h2>Users Management</h2>

<div id="users">Loading...</div>

</div>

<script>

const ADMIN="ayushprajpati6@gmail.com";

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

let user=JSON.parse(localStorage.getItem("user"));

if(!user || user.email!==ADMIN){

alert("Admin Only");
location.href="index.html";

}

/* GET DB */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());
let data=await r.json();

return Array.isArray(data)?data:[];

}catch(e){

console.log(e);
return [];

}

}

/* SAVE DB */

async function saveDB(db,data){

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({db:db,data:data})
});

}

/* LOAD USERS */

async function loadUsers(){

let users=await getDB("users");

let box=document.getElementById("users");

box.innerHTML="";

if(!users.length){

box.innerHTML="No Users Found";
return;

}

users.reverse().forEach(u=>{

if(!u.email || u.email==="guest") return;

let status="";

if(u.banned){
status="<span class='status-banned'>Banned</span>";
}
else if(u.seller){
status="<span class='status-seller'>Seller</span>";
}
else if(u.sellerRequest){
status="<span class='status-request'>Seller Request</span>";
}
else{
status="<span class='status-active'>User</span>";
}

/* BUTTONS */

let buttons="";

/* SELLER REQUEST */

if(u.sellerRequest){

buttons+=`
<button class="approve"
onclick="approveSeller('${u.email}')">
Approve Seller
</button>

<button class="reject"
onclick="rejectSeller('${u.email}')">
Reject
</button>
`;

}

/* BAN / UNBAN */

if(u.banned){

buttons+=`
<button class="unban"
onclick="toggleBan('${u.email}',false)">
Unban
</button>
`;

}else{

buttons+=`
<button class="ban"
onclick="toggleBan('${u.email}',true)">
Ban
</button>
`;

}

box.innerHTML+=`

<div class="card">

<b>${u.email}</b>

<br><br>

Status : ${status}

<br><br>

${buttons}

</div>

`;

});

}

/* APPROVE SELLER */

async function approveSeller(email){

if(!confirm("Approve this seller?")) return;

let users=await getDB("users");

users=users.map(u=>{

if(u.email===email){

u.seller=true;
u.sellerRequest=false;

}

return u;

});

await saveDB("users",users);

alert("Seller Approved");

loadUsers();

}

/* REJECT SELLER */

async function rejectSeller(email){

if(!confirm("Reject seller request?")) return;

let users=await getDB("users");

users=users.map(u=>{

if(u.email===email){

u.sellerRequest=false;

}

return u;

});

await saveDB("users",users);

alert("Seller Request Rejected");

loadUsers();

}

/* BAN / UNBAN */

async function toggleBan(email,ban){

if(!confirm(ban?"Ban this user?":"Unban this user?")) return;

let users=await getDB("users");

users=users.map(u=>{

if(u.email===email){

u.banned=ban;

}

return u;

});

await saveDB("users",users);

alert(ban?"User Banned":"User Unbanned");

loadUsers();

}

/* INIT */

loadUsers();

</script>

</body>
</html>
