<!DOCTYPE html>
<html>

<head>

<title>Cart - CreatorHub</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

nav{
background:black;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.back{
font-size:22px;
cursor:pointer;
}

nav a{
color:#22c55e;
text-decoration:none;
}

.container{
padding:20px;
}

.card{
background:#222;
display:flex;
gap:15px;
margin-bottom:15px;
padding:15px;
border-radius:10px;
align-items:center;
}

.card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
}

.info{
flex:1;
}

button{
background:orange;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:6px;
}

.total{
background:black;
padding:15px;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<nav>

<div class="left">

<div class="back" onclick="history.back()">⬅</div>

🛒 CreatorHub Cart

</div>

<a href="dashboard.html">Dashboard</a>

</nav>

<div class="container">

<h2>Your Cart</h2>

<div id="cart">Loading...</div>

<div id="totalBox" class="total" style="display:none">

Total ₹ :
<span id="total">0</span>

<button onclick="placeOrder()" style="width:100%;margin-top:10px">
🔥 Buy Now
</button>

</div>

</div>

<script>

/* APIs */

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

/* CART */

let cart = JSON.parse(localStorage.getItem("cart")) || []

function driveImage(link){

if(!link) return "https://picsum.photos/200"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}
else if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w500"
}

}catch{}

return link

}

/* GET PRODUCTS */

async function getProducts(){

let r = await fetch(PRODUCT_API+"?db=products&t="+Date.now())
let data = await r.json()

return Array.isArray(data)?data:[]

}

/* LOAD CART */

async function loadCart(){

let products = await getProducts()

let html=""
let total=0

if(cart.length===0){

html="<h3>Cart Empty</h3>"
document.getElementById("totalBox").style.display="none"

}else{

cart.forEach((id,i)=>{

let p = products.find(x=>String(x.id)===String(id))

if(!p) return

total+=Number(p.price)

html+=`

<div class="card">

<img src="${driveImage(p.image)}">

<div class="info">

<h3>${p.title}</h3>

₹${p.price}

<br><br>

<button onclick="removeItem(${i})">Remove</button>

</div>

</div>

`

})

document.getElementById("total").innerText=total
document.getElementById("totalBox").style.display="block"

}

document.getElementById("cart").innerHTML=html

}

/* REMOVE ITEM */

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

loadCart()

}

/* ORDER */

async function placeOrder(){

if(cart.length===0){

alert("Cart Empty")
return

}

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user.email){

alert("Login required")
location.href="login.html"
return

}

/* FIRST PRODUCT ORDER */

let productId = cart[0]

let res=await fetch(PAYMENT_API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"create_order",
productId:productId,
type:"ebook",
buyer:user.email

})

})

let data=await res.json()

if(data.payment_session_id){

let url="https://sandbox.cashfree.com/pg/view/payment-session-id?payment_session_id="+data.payment_session_id

window.location.href=url

}else{

alert("Payment error")

}

}

loadCart()

</script>

</body>

</html>
