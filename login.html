<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreatorHub Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:30px;
border-radius:18px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px black;
position:relative;
}

.back{
position:absolute;
top:15px;
left:15px;
font-size:22px;
cursor:pointer;
}

h2{
text-align:center;
color:#22c55e;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#020617;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
cursor:pointer;
}

.link{
margin-top:10px;
text-align:center;
opacity:.7;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="back" onclick="location.href='index.html'">⬅</div>

<h2>CreatorHub Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link" onclick="guestLogin()">Continue as Guest</div>

<div class="link" onclick="location.href='register.html'">
Create Account
</div>

<div class="link" onclick="location.href='forgot.html'">
Forgot Password
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzMCnhAdxOSnSl7tO6u3yZZEARctzq9kQIenT-PoO8Y68gN5kXWViEFD01BiRObxOY1/exec";

async function login(){

let email=document.getElementById("email").value.trim().toLowerCase();
let password=document.getElementById("password").value.trim();

if(!email || !password){
alert("Fill all fields");
return;
}

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
action:"login",
email:email,
password:password
})

});

let data=await res.json();

if(!data.success){
alert(data.message || "Wrong Login");
return;
}

localStorage.setItem("user",JSON.stringify(data.user));

alert("Login Success ✅");

location.href="dashboard.html";

}catch(e){

alert("Server Error");
console.log(e);

}

}


/* ✅ GUEST LOGIN (NO API) */

function guestLogin(){

let guestUser={

name:"Guest User",
email:"guest@creatorhub.com",
guest:true

};

localStorage.setItem(
"user",
JSON.stringify(guestUser)
);

location.href="dashboard.html";

}

</script>

</body>

</html>
