<!DOCTYPE html>
<html>

<head>

<title>Admin Orders</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h2{
color:#22c55e;
}

.card{
background:#111827;
margin-top:15px;
padding:15px;
border-radius:12px;
}

.status{
margin-top:5px;
font-size:14px;
opacity:.8;
}

.paid{
color:#22c55e;
}

.pending{
color:orange;
}

</style>

</head>

<body>

<h2>CreatorHub Orders</h2>

<div id="orders">Loading...</div>

<script>

/* ADMIN */

const ADMIN="ayushprajpati6@gmail.com"

/* APIs */

const PAYMENT_API="https://script.google.com/macros/s/AKfycbyK8NocIvdPbMftllnwJh1EHZFhuJcISiTMoq2J8zdvQAswRoNS8llQfyW7QhHrvj_W/exec"

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"


/* LOGIN CHECK */

let user=null

try{
user=JSON.parse(localStorage.getItem("user"))
}catch{}

if(!user || user.email!==ADMIN){

alert("Admin only")

location.href="index.html"

}


/* DATABASE */

async function getDB(api,db){

let r=await fetch(api+"?db="+db+"&t="+Date.now())

let data=await r.json()

return Array.isArray(data)?data:[]

}


/* LOAD ORDERS */

async function loadOrders(){

let orders=await getDB(PAYMENT_API,"orders")

let products=await getDB(PRODUCT_API,"products")

let box=document.getElementById("orders")

if(!orders.length){

box.innerHTML="No Orders Yet"
return

}

let html=""

orders.reverse().forEach(o=>{

let product=
products.find(p=>String(p.id)===String(o.productId))

let title=
product?product.title:"Unknown Product"

let status=o.payment || "pending"

html+=`

<div class="card">

<h3>${title}</h3>

Buyer : ${o.buyer}

<br>

Seller : ${o.seller}

<br>

Amount : ₹${o.amount}

<div class="status ${status==='paid'?'paid':'pending'}">

Payment : ${status}

</div>

</div>

`

})

box.innerHTML=html

}

loadOrders()

</script>

</body>

</html>
