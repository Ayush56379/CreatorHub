<script>

const ADMIN="ayushprajpati6@gmail.com";

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

let user=JSON.parse(localStorage.getItem("user"));

if(!user || user.email!==ADMIN){

alert("Admin Only");

location.href="index.html";

}


/* DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let d=await r.json();

return Array.isArray(d)?d:[];

}catch(e){

console.log(e);

return [];

}

}

async function saveDB(db,data){

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify({
db:db,
data:data
})
});

}


/* PREMIUM AUTO EXPIRY CHECK */

async function checkPremiumExpiry(){

let users=await getDB("users");

let now=new Date();

let changed=false;

users.forEach(u=>{

if(u.premium && u.premiumExpire){

let exp=new Date(u.premiumExpire);

if(now>exp){

u.premium=false;

changed=true;

}

}

});

if(changed){

await saveDB("users",users);

}

}

checkPremiumExpiry();


/* OWNER PROFIT */

async function loadProfit(){

let orders=await getDB("orders");

let total=0;

orders.forEach(o=>{
total+=Number(o.amount||0)*0.20;
});

document.getElementById("profit").innerText=Math.floor(total);

new Chart(
document.getElementById("chart"),
{
type:"line",
data:{
labels:orders.map((_,i)=>"Order "+(i+1)),
datasets:[{
label:"Owner Profit",
data:orders.map(o=>(o.amount||0)*0.20),
borderColor:"#22c55e",
tension:.4
}]
}
});

}

loadProfit();


/* SELLER REQUEST LOAD */

async function loadSellerRequests(){

let users=await getDB("users");

let box=document.getElementById("sellerList");

box.innerHTML="";

let pending=
users.filter(
u=>u.sellerRequest===true && !u.seller
);

if(pending.length===0){

box.innerHTML="No Seller Requests";

return;

}

pending.forEach(u=>{

box.innerHTML+=`

<div class="row">

<b>${u.name||"User"}</b>

<br>

${u.email}

<br>

<button class="approve"
onclick="approveSeller('${u.email}')">

Approve ✅

</button>

<button class="reject"
onclick="rejectSeller('${u.email}')">

Reject ❌

</button>

</div>

`;

});

}

loadSellerRequests();


async function approveSeller(email){

let users=await getDB("users");

let index=users.findIndex(
u=>u.email===email
);

if(index>-1){

users[index].seller=true;
users[index].sellerRequest=false;

}

await saveDB("users",users);

alert("Seller Approved ✅");

loadSellerRequests();

}


async function rejectSeller(email){

let users=await getDB("users");

let index=users.findIndex(
u=>u.email===email
);

if(index>-1){

users[index].sellerRequest=false;

}

await saveDB("users",users);

alert("Rejected ❌");

loadSellerRequests();

}


/* PREMIUM REQUEST LOAD */

async function loadPremiumRequests(){

let requests=await getDB("premiumRequests");

let box=document.getElementById("premiumList");

box.innerHTML="";

if(!requests.length){

box.innerHTML="No Premium Requests";

return;

}

requests
.filter(r=>r.status==="pending")
.forEach(r=>{

box.innerHTML+=`

<div class="row">

<b>${r.email}</b>

<br>

Plan : ${r.plan}

<br>

Price : ₹${r.price}

<br>

<button class="approve"
onclick="approvePremium('${r.email}','${r.plan}')">

Approve Premium ✅

</button>

<button class="reject"
onclick="rejectPremium('${r.id}')">

Reject ❌

</button>

</div>

`;

});

}

loadPremiumRequests();


async function approvePremium(email,plan){

let users=await getDB("users");

let index=users.findIndex(
u=>u.email===email
);

if(index>-1){

users[index].premium=true;

let days=30;

if(plan==="15 Days") days=15;
if(plan==="Monthly") days=30;
if(plan==="Yearly") days=365;

let d=new Date();

d.setDate(d.getDate()+days);

users[index].premiumExpire=d.toISOString();

}

await saveDB("users",users);

alert("Premium Activated ✅");

loadPremiumRequests();

}


async function rejectPremium(id){

let requests=await getDB("premiumRequests");

let index=requests.findIndex(
r=>r.id==id
);

if(index>-1){

requests[index].status="rejected";

}

await saveDB("premiumRequests",requests);

alert("Rejected ❌");

loadPremiumRequests();

}

</script>
