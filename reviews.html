<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Reviews</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
background:#000;
padding:12px;
}

.backBtn{
background:#2563eb;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.dashBtn{
background:#f59e0b;
padding:8px 14px;
border-radius:8px;
color:white;
text-decoration:none;
}

.container{
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:10px;
margin-top:10px;
padding:10px;
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

.submitBtn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
background:orange;
border-radius:10px;
cursor:pointer;
}

.review{
background:#111;
padding:12px;
border-radius:8px;
margin-top:10px;
line-height:22px;
}

</style>

</head>

<body>

<div class="header">

<button class="backBtn" onclick="history.back()">⬅</button>

⭐ Reviews

<a href="dashboard.html" class="dashBtn">
Dashboard
</a>

</div>

<div class="container">

<div class="card">

<h2>Leave Review ⭐</h2>

<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="reviewText"
placeholder="Write Review"></textarea>

<button class="submitBtn"
id="submitBtn"
onclick="submitReview()">
Submit Review
</button>

<h3>My Reviews</h3>

<div id="reviewList">
Loading...
</div>

</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

let user =
JSON.parse(localStorage.getItem("user") || "null");

if(!user){

alert("Login First");
location.href="login.html";

}

/* PRODUCT */

let reviewProduct =
localStorage.getItem("reviewProduct");

if(!reviewProduct){

alert("No Product Selected");
location.href="index.html";

}


/* DATABASE */

async function getDB(db){

try{

let r =
await fetch(API+"?db="+db+"&t="+Date.now());

let data =
await r.json();

return Array.isArray(data)?data:[];

}catch{

return[];

}

}

async function saveDB(db,data){

await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
db:db,
data:data
})

});

}


/* SUBMIT REVIEW */

async function submitReview(){

let btn =
document.getElementById("submitBtn");

let text =
document.getElementById("reviewText").value.trim();

let rating =
Number(document.getElementById("rating").value);

if(!text){

alert("Write Review");
return;

}

btn.disabled=true;
btn.innerText="Submitting...";

/* PURCHASE CHECK */

let orders =
await getDB("orders");

let purchased =
orders.find(o=>

o.buyer===user.email &&
String(o.productId)===String(reviewProduct) &&
o.status==="paid"

);

if(!purchased){

alert("Only buyers can review");

btn.disabled=false;
btn.innerText="Submit Review";

return;

}

/* GET REVIEWS */

let reviews =
await getDB("reviews");

/* DUPLICATE STOP */

let already =
reviews.find(r=>

r.user===user.email &&
String(r.productId)===String(reviewProduct)

);

if(already){

alert("You already reviewed");

btn.disabled=false;
btn.innerText="Submit Review";

return;

}

/* SAVE REVIEW */

reviews.push({

user:user.email,
productId:reviewProduct,
rating:rating,
text:text,
date:new Date().toLocaleString()

});

await saveDB("reviews",reviews);

alert("Review Submitted ✅");

document.getElementById("reviewText").value="";

btn.disabled=false;
btn.innerText="Submit Review";

loadReviews();

}


/* LOAD REVIEWS */

async function loadReviews(){

let reviews =
await getDB("reviews");

let my =
reviews.filter(r=>

r.user===user.email &&
String(r.productId)===String(reviewProduct)

);

let box =
document.getElementById("reviewList");

if(!my.length){

box.innerHTML="No Reviews Yet";
return;

}

box.innerHTML="";

my.forEach(r=>{

let stars="";

for(let i=1;i<=r.rating;i++){
stars+="⭐";
}

box.innerHTML+=`

<div class="review">

<b>${stars}</b>

<br>

${r.text}

<br>

<small>
${r.date}
</small>

</div>

`;

});

}

loadReviews();

</script>

</body>
</html>
