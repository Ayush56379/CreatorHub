<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Delete Products</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
text-align:center;
}

.card{
background:#111827;
padding:25px;
border-radius:12px;
max-width:450px;
margin:auto;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.delete{
background:red;
color:white;
}

.back{
background:#2563eb;
padding:12px;
margin-bottom:15px;
border-radius:8px;
display:inline-block;
cursor:pointer;
}

</style>

</head>

<body>

<div class="back"
onclick="history.back()">

⬅ Back

</div>

<div class="card">

<h2>
🗑 Delete All Products
</h2>

<p>
All uploaded ebooks will be removed permanently.
</p>

<button
class="delete"
onclick="deleteAllProducts()">

Delete All Products 🚨

</button>

</div>

<script>

/* ADMIN */

const ADMIN="ayushprajpati6@gmail.com"

/* PRODUCT API */

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

/* USER CHECK */

let user=JSON.parse(localStorage.getItem("user")||"{}")

if(!user || user.email!==ADMIN){

alert("Admin Only")
location.href="index.html"

}

/* DELETE PRODUCTS */

async function deleteAllProducts(){

let ok=confirm(
"⚠️ WARNING\n\nAll ebooks will be permanently deleted.\n\nContinue?"
)

if(!ok) return

try{

let res=await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"deleteAllProducts"
})
})

let data=await res.json()

if(data.success){

alert("All Products Deleted ✅")

location.href="products.html"

}else{

alert("Delete failed")

}

}catch(e){

alert("Server error")

}

}

</script>

</body>

</html>
