<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Buy Ebook</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:14px;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-weight:bold;
color:#22c55e;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:16px;
max-width:520px;
margin:auto;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

</style>
</head>

<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<div class="title">CreatorHub</div>
</div>

<div class="container">
<div class="card">

<h2>Buy Ebook</h2>

<img id="cover">

<h3 id="title">Loading...</h3>

<h2 id="price"></h2>

<button id="buyBtn" onclick="buyNow()">Buy Now</button>

</div>
</div>

<script>

/* ================= APIs ================= */

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec"

const PAYMENT_API =
"https://script.google.com/macros/s/AKfycbx7vyDJEi9v2RO7ujHdMAnlgUX8AV2JVOfydtw8DJU4AI-7vcTlWMEt07KFcFr1lYTa/exec"

/* ================= USER ================= */

let user = JSON.parse(localStorage.getItem("user") || "{}")

if(!user || !user.email){

alert("Please login first")
location.href="login.html"

}

/* ================= PRODUCT ID ================= */

let buyId = localStorage.getItem("buyProduct")

if(!buyId){

alert("Product Missing")
location.href="index.html"

}

/* ================= DRIVE IMAGE FIX ================= */

function driveImage(link){

if(!link) return "https://picsum.photos/500"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000"
}

}catch{}

return link

}

/* ================= LOAD PRODUCT ================= */

let product = null

async function loadProduct(){

try{

let res = await fetch(PRODUCT_API+"?db=products&t="+Date.now())

let products = await res.json()

if(!Array.isArray(products)){

alert("Product API Error")
return

}

product = products.find(
p => String(p.id) === String(buyId)
)

if(!product){

alert("Product not found")
location.href="index.html"
return

}

document.getElementById("title").innerText = product.title || "Untitled"

document.getElementById("price").innerText = "₹ "+(product.price || 0)

document.getElementById("cover").src = driveImage(product.image)

}catch(e){

console.log("Product load error:",e)
alert("Failed to load product")

}

}

loadProduct()

/* ================= BUY ================= */

async function buyNow(){

if(!product){

alert("Product not loaded yet")
return

}

let btn = document.getElementById("buyBtn")

btn.innerText="Creating Order..."
btn.disabled=true

try{

let res = await fetch(PAYMENT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"create_order",
productId:product.id,
buyer:user.email

})

})

let data = await res.json()

if(data.payment_link){

window.location.href = data.payment_link

}else{

alert(data.error || "Payment initialization failed")

btn.innerText="Buy Now"
btn.disabled=false

}

}catch(err){

console.log("Payment error:",err)

alert("Payment server error")

btn.innerText="Buy Now"
btn.disabled=false

}

}

</script>

</body>
</html>
