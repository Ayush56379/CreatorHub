<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Orders</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.topbar{
display:flex;
align-items:center;
padding:15px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
color:#22c55e;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
margin-bottom:15px;
}

.status{
padding:5px 10px;
border-radius:8px;
font-size:13px;
display:inline-block;
margin-top:6px;
}

.processing{background:#f59e0b}
.shipped{background:#3b82f6}
.transit{background:#6366f1}
.delivery{background:#10b981}
.delivered{background:#22c55e}

.track{
margin-top:10px;
padding:10px 14px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.empty{
text-align:center;
padding:60px;
opacity:.7;
}

</style>

</head>

<body>

<div class="topbar">

<div class="back" onclick="history.back()">⬅</div>

<div class="title">My Orders</div>

</div>


<div class="container">

<div id="orders">

Loading orders...

</div>

</div>


<script>

/* ===== API ===== */

const API="YOUR_SCRIPT_URL";


/* ===== USER ===== */

let user=JSON.parse(localStorage.getItem("user")||"{}");

if(!user.email){

alert("Login first");

location.href="login.html";

}


/* ===== LOAD ORDERS ===== */

async function loadOrders(){

let box=document.getElementById("orders");

box.innerHTML="Loading...";

try{

let res=await fetch(API+"?db=orders&t="+Date.now());

let orders=await res.json();

if(!Array.isArray(orders)){
orders=[];
}


/* FILTER USER ORDERS */

let myOrders=orders.filter(
o=>o.buyer===user.email
);


/* NEW FIRST */

myOrders.reverse();


if(myOrders.length===0){

box.innerHTML=`<div class="empty">

No orders yet 📦

</div>`;

return;

}

box.innerHTML="";


myOrders.forEach(o=>{


let status=o.order_status || "processing";

let statusClass="processing";


if(status==="shipped") statusClass="shipped";
if(status==="in_transit") statusClass="transit";
if(status==="out_for_delivery") statusClass="delivery";
if(status==="delivered") statusClass="delivered";


let trackBtn="";


if(o.tracking){

trackBtn=`
<button class="track"
onclick="trackOrder('${o.tracking}','${o.courier}')">
Track Order
</button>
`;

}


box.innerHTML+=`

<div class="card">

<b>Order ID:</b> ${o.id}

<br><br>

<b>Product:</b> ${o.productId}

<br>

<b>Amount:</b> ₹ ${o.amount}

<br>

<b>Date:</b> ${o.date}

<br><br>

<b>Status:</b>

<span class="status ${statusClass}">

${status}

</span>

<br><br>

<b>Courier:</b> ${o.courier || "Not Assigned"}

<br>

<b>Tracking:</b> ${o.tracking || "Not Available"}

<br>

<b>Delivery:</b> ${o.delivery_date || "Pending"}

${trackBtn}

</div>

`;

});

}catch(e){

box.innerHTML="Failed to load orders ❌";

}

}


/* ===== TRACK ORDER ===== */

function trackOrder(tracking,courier){

if(!tracking){

alert("Tracking not available");

return;

}

/* example courier link */

let url="";

if(courier==="delhivery"){

url="https://www.delhivery.com/track/"+tracking;

}else{

url="https://www.google.com/search?q=track+order+"+tracking;

}

window.open(url);

}


/* ===== INIT ===== */

loadOrders();

</script>

</body>

</html>
