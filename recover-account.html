<button onclick="recoverAccount()">
Recover My Account
</button>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

async function recoverAccount(){

let user = JSON.parse(localStorage.getItem("user") || "null");

if(!user || !user.email){

alert("Login required");

location.href="login.html";

return;

}

try{

/* LOAD USERS */

let res =
await fetch(API+"?db=users&t="+Date.now());

let users =
await res.json();

if(!Array.isArray(users)){

alert("Database error");

return;

}

/* FIND USER */

let index =
users.findIndex(
u=>u.email===user.email
);

if(index===-1){

alert("User not found");

return;

}

let account = users[index];

/* CHECK STATUS */

if(!account.deleted){

alert("Account is already active");

return;

}

/* OPTIONAL 7 DAY LIMIT */

if(account.deleteDate){

let deleted =
new Date(account.deleteDate);

let now =
new Date();

let diff =
(now - deleted) / (1000*60*60*24);

if(diff > 7){

alert("Recovery period expired");

return;

}

}

/* RECOVER ACCOUNT */

account.deleted = false;

account.deleteDate = "";

/* SAVE DATABASE */

await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

db:"users",
data:users

})

});

alert("Account recovered successfully ✅");

/* REDIRECT */

location.href="dashboard.html";

}catch(e){

console.log(e);

alert("Server error ❌");

}

}

</script>
