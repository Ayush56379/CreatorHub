<header class="mainHeader">

<div class="menu" onclick="openMenu()">☰</div>

<div class="logo" onclick="location.href='index.html'">
CreatorHub
</div>

<div class="right">

<div class="cart" onclick="location.href='cart.html'">
🛒
</div>

<img id="profile" class="profile"
onclick="location.href='dashboard.html'">

</div>

</header>

<!-- BIG SEARCH BAR -->

<div class="searchSection">

<input
type="text"
placeholder="Search ebooks..."
oninput="runSearch(this.value)"
>

</div>

<style>

/* HEADER */

.mainHeader{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
background:#020617;
box-shadow:0 5px 20px rgba(0,0,0,.7);
position:sticky;
top:0;
z-index:999;
}

/* MENU */

.menu{
font-size:26px;
cursor:pointer;
color:white;
}

/* LOGO */

.logo{
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#22c55e,#4ade80);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
cursor:pointer;
}

/* RIGHT SIDE */

.right{
display:flex;
align-items:center;
gap:14px;
}

/* CART */

.cart{
font-size:22px;
cursor:pointer;
}

/* PROFILE */

.profile{
width:40px;
height:40px;
border-radius:50%;
border:2px solid #22c55e;
object-fit:cover;
cursor:pointer;
transition:.2s;
}

.profile:hover{
transform:scale(1.05);
}

/* BIG SEARCH */

.searchSection{
padding:16px;
background:#020617;
}

.searchSection input{
width:100%;
padding:15px 18px;
border-radius:40px;
border:none;
background:#111827;
color:white;
font-size:15px;
outline:none;
box-shadow:0 4px 15px rgba(0,0,0,.5);
}

.searchSection input::placeholder{
opacity:.7;
}

</style>

<script>

/* MENU FUNCTIONS */

function openMenu(){

let menu=document.getElementById("menu");

let overlay=document.getElementById("overlay");

if(menu){
menu.classList.add("open");
}

if(overlay){
overlay.style.display="block";
}

}

function closeMenu(){

let menu=document.getElementById("menu");

let overlay=document.getElementById("overlay");

if(menu){
menu.classList.remove("open");
}

if(overlay){
overlay.style.display="none";
}

}

/* SEARCH SAFE */

function runSearch(q){

if(typeof searchProduct === "function"){
searchProduct(q);
}

}

/* PROFILE IMAGE */

function loadProfile(){

let user=JSON.parse(localStorage.getItem("user")||"{}");

let profileImg=localStorage.getItem("profile_"+(user.email||"guest"));

let profile=document.getElementById("profile");

if(profile){

profile.src=
profileImg||
"https://cdn-icons-png.flaticon.com/512/149/149071.png";

}

}

/* WAIT HEADER LOAD */

setTimeout(loadProfile,100);

</script>
