<!DOCTYPE html>
<html>

<head>

<title>Subscription Success</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:60px;
}

.card{
background:#111827;
padding:40px;
border-radius:14px;
max-width:500px;
margin:auto;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
margin-top:20px;
}

.loader{
margin-top:20px;
font-size:18px;
opacity:.8;
}

</style>

</head>

<body>

<div class="card">

<h1 id="title">Payment Processing...</h1>

<p id="msg">
Verifying your subscription
</p>

<div class="loader" id="loader">
⏳ Please wait...
</div>

<button onclick="location.href='index.html'">
Go Home
</button>

</div>

<script>

/* PAYMENT VERIFY API */

const API="https://script.google.com/macros/s/AKfycbx7vyDJEi9v2RO7ujHdMAnlgUX8AV2JVOfydtw8DJU4AI-7vcTlWMEt07KFcFr1lYTa/exec";

/* GET ORDER ID */

function getOrderId(){

let params=new URLSearchParams(location.search);

return (

params.get("order_id") ||
params.get("orderId") ||
params.get("cf_order_id") ||
params.get("order-id")

);

}

let orderId=getOrderId();

let retryCount=0;
const maxRetry=10;

/* VERIFY PAYMENT */

async function verify(){

if(!orderId){

document.getElementById("title").innerText="Order Error";

document.getElementById("msg").innerText="Order ID not found";

document.getElementById("loader").style.display="none";

return;

}

/* STOP AFTER MAX RETRY */

if(retryCount>=maxRetry){

document.getElementById("title").innerText="Verification Timeout";

document.getElementById("msg").innerText="Unable to verify payment. Please contact support.";

document.getElementById("loader").style.display="none";

return;

}

try{

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

action:"verify_subscription",
orderId:orderId

})

});

let data=await res.json();

if(data.status==="success"){

document.getElementById("title").innerText="Subscription Activated 🎉";

document.getElementById("msg").innerText="Premium access is now active.";

document.getElementById("loader").style.display="none";

}else{

retryCount++;

setTimeout(verify,3000);

}

}catch(e){

retryCount++;

document.getElementById("msg").innerText="Verification error. Retrying...";

setTimeout(verify,3000);

}

}

verify();

</script>

</body>

</html>
