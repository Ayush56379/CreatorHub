<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ebook Details - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

header{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-size:20px;
font-weight:bold;
color:#22c55e;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.book{
display:grid;
grid-template-columns:280px 1fr;
gap:25px;
}

.cover{
width:100%;
border-radius:12px;
box-shadow:0 10px 25px black;
}

.price{
color:#22c55e;
font-size:26px;
margin:10px 0;
}

.buy{
width:100%;
padding:14px;
border:none;
background:linear-gradient(90deg,#22c55e,#4ade80);
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.share{
margin-top:10px;
padding:12px;
width:100%;
border:none;
background:#2563eb;
border-radius:10px;
color:white;
cursor:pointer;
}

.section{
margin-top:30px;
background:#111827;
padding:18px;
border-radius:12px;
}

.review{
border-bottom:1px solid #1f2937;
padding:10px 0;
}

.star{
color:#facc15;
}

textarea{
width:100%;
padding:10px;
border-radius:8px;
border:none;
background:#020617;
color:white;
margin-top:10px;
}

.submit{
margin-top:10px;
padding:10px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

@media(max-width:700px){

.book{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<div class="back" onclick="history.back()">⬅</div>

<div class="title">
Ebook Details
</div>

</header>


<div class="container">

<div id="book" class="book">
Loading...
</div>

<div class="section">

<h3>⭐ Reviews</h3>

<div id="reviews">
Loading Reviews...
</div>

<textarea id="reviewText" placeholder="Write your review"></textarea>

<select id="stars">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<button class="submit" onclick="submitReview()">
Submit Review
</button>

</div>

</div>


<script>

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

let id=localStorage.getItem("viewProduct");

let user=JSON.parse(localStorage.getItem("user")) || {email:"guest"};


function driveImage(link){

if(!link) return "https://picsum.photos/400";

try{

let id="";

if(link.includes("id="))
id=link.split("id=")[1].split("&")[0];

if(link.includes("/file/d/"))
id=link.split("/file/d/")[1].split("/")[0];

if(id)
return "https://drive.google.com/thumbnail?id="+id+"&sz=w1000";

}catch{}

return link;

}

async function getDB(db){

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let data=await r.json();

return Array.isArray(data)?data:[];

}

async function loadBook(){

let products=await getDB("products");

let orders=await getDB("orders");

let reviews=await getDB("reviews");

let book=products.find(p=>String(p.id)===String(id));

if(!book){

document.getElementById("book").innerHTML="Book not found";

return;

}

let sales=orders.filter(o=>o.product==book.id).length;

document.getElementById("book").innerHTML=`

<img class="cover" src="${driveImage(book.image)}">

<div>

<h2>${book.title}</h2>

<p>Author : ${book.author || "Unknown"}</p>

<div class="price">₹ ${book.price}</div>

<p>${book.description || ""}</p>

<p>Sales : ${sales}</p>

<button class="buy" onclick="buyBook('${book.id}')">
Buy Ebook
</button>

<button class="share" onclick="shareBook('${book.title}')">
Share
</button>

</div>

`;

loadReviews();

}

async function loadReviews(){

let reviews=await getDB("reviews");

let my=reviews.filter(r=>String(r.product)===String(id));

let html="";

my.reverse().forEach(r=>{

html+=`
<div class="review">

<div class="star">${"⭐".repeat(r.star)}</div>

<p>${r.comment}</p>

<small>${r.user}</small>

</div>
`;

});

document.getElementById("reviews").innerHTML=html || "No Reviews Yet";

}

async function submitReview(){

let text=document.getElementById("reviewText").value;

let star=document.getElementById("stars").value;

if(!text){
alert("Write Review");
return;
}

let reviews=await getDB("reviews");

reviews.push({

product:id,
user:user.email,
comment:text,
star:Number(star),
date:new Date().toLocaleString()

});

await fetch(API,{
method:"POST",
headers:{'Content-Type':'text/plain'},
body:JSON.stringify({db:"reviews",data:reviews})
});

alert("Review Added");

loadReviews();

}

function buyBook(id){

localStorage.setItem("buyProduct",id);

location.href="payment.html";

}

function shareBook(title){

let url=window.location.href;

if(navigator.share){

navigator.share({
title:title,
text:"Check this ebook on CreatorHub",
url:url
});

}else{

window.open(
"https://wa.me/?text="+encodeURIComponent(title+" "+url)
);

}

}

loadBook();

</script>

</body>
</html>
