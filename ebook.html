<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ebook - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */

header{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-size:20px;
color:#22c55e;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* COVER */

.cover{
width:100%;
max-width:260px;
aspect-ratio:2/3;
object-fit:cover;
border-radius:10px;
box-shadow:0 10px 25px black;
}

/* TITLE */

.bookTitle{
font-size:24px;
margin-top:15px;
font-weight:bold;
}

.price{
font-size:22px;
color:#22c55e;
margin-top:5px;
}

/* BUTTONS */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.buy{
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
}

.cart{
background:#2563eb;
color:white;
}

.share{
background:#111827;
color:white;
}

/* DESCRIPTION */

.desc{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:10px;
line-height:1.6;
}

/* RECOMMENDED */

.section{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
}

.card{
background:#111827;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
border-radius:8px;
}

.view{
margin-top:6px;
background:#22c55e;
border:none;
padding:8px;
border-radius:6px;
width:100%;
color:white;
cursor:pointer;
}

/* FOOTER */

footer{
background:black;
padding:30px;
text-align:center;
margin-top:40px;
line-height:26px;
}

footer a{
color:#22c55e;
text-decoration:none;
margin:0 5px;
}

</style>

</head>

<body>

<header>

<div class="back" onclick="history.back()">⬅</div>

<div class="title">Ebook Details</div>

</header>


<div class="container">

<div id="book">
Loading Ebook...
</div>


<div class="section">

<h3>📚 Recommended Ebooks</h3>

<div id="recommended" class="grid">
Loading...
</div>

</div>

</div>


<footer>

<h3>CreatorHub Marketplace</h3>

Buy • Sell • Learn From Digital Products

<br><br>

Admin Commission : 20%  
Seller Earnings : 80%

<br><br>

<a href="about.html">About</a> |
<a href="privacy.html">Privacy</a> |
<a href="contact.html">Contact</a> |
<a href="terms.html">Terms</a>

<br><br>

© 2026 CreatorHub

</footer>


<script>

/* API */

const API="https://script.google.com/macros/s/AKfycbzgKPuIAmuZWOfilOj8gM9qJcZesz3ECPIhpCvBmupKFY2t76_ObVWyylnoTa4ecyda/exec";

/* PRODUCT ID */

const params=new URLSearchParams(location.search);
const id=params.get("id");

/* IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400";

try{

let fileId="";

if(link.includes("id="))
fileId=link.split("id=")[1].split("&")[0];

if(link.includes("/file/d/"))
fileId=link.split("/file/d/")[1].split("/")[0];

if(fileId)
return "https://drive.google.com/thumbnail?id="+fileId+"&sz=w1000";

}catch{}

return link;

}

/* DATABASE */

async function getDB(db){

let r=await fetch(API+"?db="+db+"&t="+Date.now());
let data=await r.json();

return Array.isArray(data)?data:[];

}

/* LOAD BOOK */

async function loadBook(){

let products=await getDB("products");

let book=products.find(p=>String(p.id)===String(id));

if(!book){

document.getElementById("book").innerHTML="Book not found";
return;

}

document.getElementById("book").innerHTML=`

<img class="cover" src="${driveImage(book.image)}">

<div class="bookTitle">
${book.title}
</div>

<div class="price">
₹ ${book.price}
</div>

<button class="btn buy" onclick="buyBook('${book.id}')">
Buy Now
</button>

<button class="btn cart" onclick="addCart('${book.id}')">
Add To Cart
</button>

<button class="btn share" onclick="shareBook('${book.title}')">
Share
</button>

<div class="desc">

<h3>Description</h3>

${book.description || "No description provided."}

</div>

`;

loadRecommended(products);

}

/* RECOMMENDED */

function loadRecommended(products){

let list=products.filter(p=>String(p.id)!==String(id)).slice(0,6);

let html="";

list.forEach(b=>{

html+=`

<div class="card">

<img src="${driveImage(b.image)}">

<h4>${b.title}</h4>

<p>₹${b.price}</p>

<button class="view"
onclick="openBook('${b.id}')">
View
</button>

</div>

`;

});

document.getElementById("recommended").innerHTML=html;

}

/* OPEN */

function openBook(id){
location.href="ebook.html?id="+id;
}

/* BUY */

function buyBook(id){

localStorage.setItem("buyProduct",id);

location.href="payment.html";

}

/* CART */

function addCart(id){

let cart=JSON.parse(localStorage.getItem("cart")||"[]");

if(cart.includes(id)){
alert("Already added");
return;
}

cart.push(id);

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to Cart");

}

/* SHARE */

function shareBook(title){

let url=location.href;

if(navigator.share){

navigator.share({
title:title,
text:"Check this ebook",
url:url
});

}else{

window.open(
"https://wa.me/?text="+encodeURIComponent(title+" "+url)
);

}

}

loadBook();

</script>

</body>
</html>
