<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ebook - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */

header{
display:flex;
align-items:center;
padding:14px;
background:#020617;
box-shadow:0 5px 20px black;
}

.back{
font-size:22px;
cursor:pointer;
width:40px;
}

.title{
flex:1;
text-align:center;
font-size:20px;
color:#22c55e;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* COVER */

.cover{
display:block;
width:200px;
max-width:90%;
aspect-ratio:2/3;
object-fit:cover;
border-radius:10px;
box-shadow:0 10px 25px black;
margin:0 auto;
}

/* TITLE */

.bookTitle{
font-size:24px;
margin-top:15px;
font-weight:bold;
text-align:center;
}

.price{
font-size:22px;
color:#22c55e;
margin-top:5px;
text-align:center;
}

/* BUTTONS */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.buy{
background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
}

.cart{
background:#2563eb;
color:white;
}

.share{
background:#111827;
color:white;
}

/* DESCRIPTION */

.desc{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:10px;
line-height:1.6;
}

/* FOOTER */

footer{
background:black;
padding:30px;
text-align:center;
margin-top:40px;
line-height:26px;
}

footer a{
color:#22c55e;
text-decoration:none;
margin:0 5px;
}

</style>

</head>

<body>

<header>

<div class="back" onclick="history.back()">⬅</div>

<div class="title">Ebook Details</div>

</header>

<div class="container">

<div id="book">
Loading Ebook...
</div>

</div>

<footer>

<h3>CreatorHub Marketplace</h3>

Buy • Sell • Learn From Digital Products

<br><br>

Admin Commission : 20%  
Seller Earnings : 80%

<br><br>

<a href="about.html">About</a> |
<a href="privacy.html">Privacy</a> |
<a href="contact.html">Contact</a> |
<a href="terms.html">Terms</a>

<br><br>

© 2026 CreatorHub

</footer>

<script>

/* IMPORTANT — SAME API AS HOMEPAGE */

const API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec";

/* GET PRODUCT ID */

let params=new URLSearchParams(location.search);

let id=params.get("id") || localStorage.getItem("viewProduct");

if(!id){
document.getElementById("book").innerHTML="Product ID Missing";
}

/* DRIVE IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400";

try{

let fileId="";

if(link.includes("id=")){
fileId=link.split("id=")[1].split("&")[0];
}

if(link.includes("/file/d/")){
fileId=link.split("/file/d/")[1].split("/")[0];
}

if(fileId){
return "https://drive.google.com/thumbnail?id="+fileId+"&sz=w1000";
}

}catch{}

return link;

}

/* GET DATABASE */

async function getDB(db){

try{

let r=await fetch(API+"?db="+db+"&t="+Date.now());

let data=await r.json();

return Array.isArray(data)?data:[];

}catch{

return [];

}

}

/* LOAD BOOK */

async function loadBook(){

let products=await getDB("products");

let book=products.find(p=>String(p.id)===String(id));

if(!book){

document.getElementById("book").innerHTML="Book not found";
return;

}

document.getElementById("book").innerHTML=`

<img class="cover" src="${driveImage(book.image)}">

<div class="bookTitle">
${book.title || "Untitled"}
</div>

<div class="price">
₹ ${book.price || 0}
</div>

<button class="btn buy" onclick="buyBook('${book.id}')">
Buy Now
</button>

<button class="btn cart" onclick="addCart('${book.id}')">
Add To Cart
</button>

<button class="btn share" onclick="shareBook('${book.title}')">
Share
</button>

<div class="desc">

<h3>Description</h3>

${book.description || "No description provided."}

</div>

`;

}

/* BUY */

function buyBook(id){

localStorage.setItem("buyProduct",id);

location.href="payment.html";

}

/* ADD CART */

function addCart(id){

let cart=JSON.parse(localStorage.getItem("cart")||"[]");

if(cart.includes(id)){
alert("Already added");
return;
}

cart.push(id);

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to Cart");

}

/* SHARE */

function shareBook(title){

let url=location.href;

if(navigator.share){

navigator.share({
title:title,
text:"Check this ebook",
url:url
});

}else{

window.open(
"https://wa.me/?text="+encodeURIComponent(title+" "+url)
);

}

}

/* START */

loadBook();

</script>

</body>
</html>
