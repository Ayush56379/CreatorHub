<script>

document.addEventListener("DOMContentLoaded", async function(){

const API="https://creatorhub-f2fe.onrender.com/api";

/* LOGIN CHECK */

const token = localStorage.getItem("token");

let user = null;

try{
user = JSON.parse(localStorage.getItem("user"));
}catch{
user = null;
}

if(!token || !user){

location.href="login.html";
return;

}


/* USER NAME */

const username = document.getElementById("username");

if(username){

username.innerText = "Welcome " + (user.name || "User") + " 👋";

}


/* PROFILE IMAGE */

const profile = document.getElementById("profileImg");

if(profile){

const saved = localStorage.getItem("profile_" + user.email);

if(saved){
profile.src = saved;
}

}


/* PROFILE UPLOAD */

window.uploadProfile = function(e){

const file = e.target.files[0];

if(!file) return;

/* IMAGE TYPE CHECK */

if(!file.type.startsWith("image/")){
alert("Please upload an image");
return;
}

const reader = new FileReader();

reader.onload = function(){

localStorage.setItem(
"profile_" + user.email,
reader.result
);

if(profile){
profile.src = reader.result;
}

};

reader.readAsDataURL(file);

};


/* SAFE NAVIGATION */

window.go = function(page){

if(!page) return;

location.href = page;

};


/* LOAD STATS */

try{

/* PRODUCTS */

const pres = await fetch(API + "/products");

if(!pres.ok) throw new Error("Products API Error");

const pdata = await pres.json();

const pc = document.getElementById("productCount");

if(pc){

pc.innerText = pdata?.products?.length || 0;

}


/* ORDERS */

const ores = await fetch(API + "/orders",{
headers:{
Authorization:"Bearer " + token
}
});

if(!ores.ok) throw new Error("Orders API Error");

const odata = await ores.json();

const orders = odata?.orders || [];

const oc = document.getElementById("orderCount");

if(oc){

oc.innerText = orders.length;

}


/* EARNINGS */

let total = 0;

orders.forEach(o=>{

if(o.product && o.product.price){

total += Number(o.product.price);

}

});

const earn = document.getElementById("earnings");

if(earn){

earn.innerText = "₹ " + total;

}

}

catch(e){

console.log("Stats Error:", e);

}

});


/* LOGOUT */

function logout(){

localStorage.removeItem("token");
localStorage.removeItem("user");

location.href="login.html";

}

</script>
