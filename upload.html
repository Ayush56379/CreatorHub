<!DOCTYPE html>
<html>
<head>

<title>Upload Ebook</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
}

.progress{

height:20px;
background:#1f2937;
border-radius:10px;
margin-top:10px;

}

.bar{

height:100%;
width:0%;
background:#22c55e;
border-radius:10px;

}

</style>

</head>

<body>

<h2>Upload Ebook</h2>

<input id="title" placeholder="Book Title">

<input type="file" id="cover">

<input type="file" id="pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button onclick="upload()">Upload</button>

<script>

const API="https://script.google.com/macros/s/AKfycbx6U5oGFpD5HSl8wlwjv_z4zSMa_C25LLXmh2DYRZZxu-ac4iowrKEwXCNkua85U8dQ/exec";

function toBase64(file){

return new Promise((resolve,reject)=>{

let reader=new FileReader();

reader.onload=()=>resolve(reader.result);

reader.onerror=reject;

reader.readAsDataURL(file);

});

}

async function upload(){

let cover=document.getElementById("cover").files[0];
let pdf=document.getElementById("pdf").files[0];

if(!cover||!pdf){

alert("Select Files");

return;

}

let bar=document.getElementById("bar");

bar.style.width="20%";

let image=await toBase64(cover);

bar.style.width="50%";

let pdfBase64=await toBase64(pdf);

bar.style.width="70%";

let res=await fetch(API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"uploadFile",
image:image,
pdf:pdfBase64

})

});

bar.style.width="90%";

let result=await res.json();

bar.style.width="100%";

if(result.success){

alert("Upload Success");

}else{

alert(result.message);

}

}

</script>

</body>
</html>
