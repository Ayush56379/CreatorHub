<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Upload Ebook - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding:20px;
}

.topbar{
display:flex;
align-items:center;
margin-bottom:20px;
}

.back{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.card{
background:#111827;
padding:25px;
border-radius:14px;
max-width:600px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

input,textarea{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#f97316;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

img{
width:100%;
margin-top:12px;
border-radius:10px;
display:none;
}

.progress{
height:22px;
background:#1f2937;
border-radius:12px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
border-radius:12px;
transition:.3s;
}

</style>
</head>
<body>

<div class="topbar">
<div class="back" onclick="history.back()">⬅</div>
<h2>Upload Ebook</h2>
</div>

<div class="card">

<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author Name">

<textarea id="description"
placeholder="Book Description"></textarea>

<input id="price"
type="number"
placeholder="Price ₹">

<p>Front Cover</p>
<input type="file" id="frontCover" accept="image/*">
<img id="previewFront">

<p>Back Cover</p>
<input type="file" id="backCover" accept="image/*">
<img id="previewBack">

<p>PDF File</p>
<input type="file" id="pdf" accept="application/pdf">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button id="uploadBtn" onclick="upload()">
Upload Ebook
</button>

</div>

<script>

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"

let user = JSON.parse(localStorage.getItem("user") || "{}");

if(!user.email){
alert("Login First");
location.href="login.html";
}

/* IMAGE PREVIEW */

function preview(input,id){

let file=input.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=e=>{
let img=document.getElementById(id);
img.src=e.target.result;
img.style.display="block";
};

reader.readAsDataURL(file);

}

document.getElementById("frontCover").onchange=
function(){ preview(this,"previewFront") }

document.getElementById("backCover").onchange=
function(){ preview(this,"previewBack") }

/* BASE64 */

function toBase64(file){

return new Promise((resolve,reject)=>{

let reader=new FileReader();

reader.onload=()=>resolve(reader.result);
reader.onerror=reject;

reader.readAsDataURL(file);

});

}

/* UPLOAD */

async function upload(){

let title=document.getElementById("title").value.trim()
let author=document.getElementById("author").value.trim()
let description=document.getElementById("description").value.trim()
let price=document.getElementById("price").value.trim()

let front=document.getElementById("frontCover").files[0]
let back=document.getElementById("backCover").files[0]
let pdf=document.getElementById("pdf").files[0]

if(!title||!price||!author||!description||!front||!back||!pdf){

alert("Fill All Fields")
return

}

/* SIZE LIMIT */

if(front.size>2*1024*1024){
alert("Front cover max 2MB")
return
}

if(back.size>2*1024*1024){
alert("Back cover max 2MB")
return
}

if(pdf.size>10*1024*1024){
alert("PDF max 10MB")
return
}

let bar=document.getElementById("bar")
let btn=document.getElementById("uploadBtn")

btn.disabled=true
btn.innerText="Uploading..."

try{

bar.style.width="20%"

let front64=await toBase64(front)

bar.style.width="40%"

let back64=await toBase64(back)

bar.style.width="60%"

let pdf64=await toBase64(pdf)

bar.style.width="80%"

let res=await fetch(PRODUCT_API,{

method:"POST",

headers:{
"Content-Type":"text/plain"
},

body:JSON.stringify({

action:"uploadFile",

title:title,
author:author,
description:description,
price:Number(price),

owner:user.email,

frontCover:front64,
backCover:back64,
pdf:pdf64

})

})

let result=await res.json()

bar.style.width="100%"

if(result.success){

alert("Ebook Uploaded Successfully ✅")

location.reload()

}else{

alert(result.message || "Upload Failed")

}

}catch(e){

alert("Upload Error")

}

btn.disabled=false
btn.innerText="Upload Ebook"

}

</script>

</body>
</html>
