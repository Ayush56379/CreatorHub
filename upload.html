<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Upload Ebook - CreatorHub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
max-width:600px;
margin:auto;
}

input,textarea,select,button{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;

}

button{

background:#f97316;
font-weight:bold;
cursor:pointer;

}

.progress{

height:20px;
background:#1f2937;
border-radius:10px;
margin-top:15px;

}

.bar{

height:100%;
width:0%;
background:#22c55e;
border-radius:10px;

}

img{

width:100%;
margin-top:10px;
border-radius:10px;

}

</style>

</head>

<body>

<div class="card">

<h2>Upload Ebook</h2>

<input id="title" placeholder="Book Title">

<input id="author" placeholder="Author Name">

<textarea id="description" placeholder="Description"></textarea>

<input id="price" type="number" placeholder="Price">

<p>Cover Image</p>

<input type="file" id="cover">

<img id="preview">

<p>PDF File</p>

<input type="file" id="pdf">

<div class="progress">

<div class="bar" id="bar"></div>

</div>

<button onclick="upload()">Upload Ebook</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx6U5oGFpD5HSl8wlwjv_z4zSMa_C25LLXmh2DYRZZxu-ac4iowrKEwXCNkua85U8dQ/exec";

/* YOUR API KEY */

const API_KEY="CREATORHUB_SECURE_KEY";

/* IMAGE PREVIEW */

cover.onchange=()=>{

let file=cover.files[0];

let reader=new FileReader();

reader.onload=e=>preview.src=e.target.result;

reader.readAsDataURL(file);

};

/* BASE64 */

function toBase64(file){

return new Promise((resolve,reject)=>{

let reader=new FileReader();

reader.onload=()=>resolve(reader.result);

reader.onerror=reject;

reader.readAsDataURL(file);

});

}

/* UPLOAD */

async function upload(){

let titleValue=title.value.trim();
let priceValue=price.value.trim();

let coverFile=cover.files[0];
let pdfFile=pdf.files[0];

if(!titleValue||!priceValue||!coverFile||!pdfFile){

alert("Fill All Fields");

return;

}

let bar=document.getElementById("bar");

bar.style.width="20%";

let image=await toBase64(coverFile);

bar.style.width="50%";

let pdfBase64=await toBase64(pdfFile);

bar.style.width="70%";

let res=await fetch(API,{

method:"POST",

headers:{

"Content-Type":"text/plain"

},

body:JSON.stringify({

api_key:API_KEY,

action:"uploadFile",

image:image,

pdf:pdfBase64

})

});

bar.style.width="90%";

let result=await res.json();

bar.style.width="100%";

if(result.success){

alert("Upload Success");

location.reload();

}else{

alert(result.message);

}

}

</script>

</body>

</html>
