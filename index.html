<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Marketplace</title>

<style>

html,body{
margin:0;
padding:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HERO */

.hero{
padding:40px 15px;
text-align:center;
background:linear-gradient(135deg,#020617,#111827);
}

.hero h1{
color:#22c55e;
margin:0;
}

/* PRODUCTS */

.products{
padding:15px;
display:grid;
grid-template-columns:1fr;
gap:15px;
}

/* CARD */

.card{
display:flex;
gap:15px;
background:#111827;
padding:12px;
border-radius:12px;
align-items:center;
box-shadow:0 10px 20px black;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:90px;
aspect-ratio:2/3;
object-fit:cover;
border-radius:8px;
}

.bookInfo{
flex:1;
}

.bookTitle{
font-size:17px;
font-weight:bold;
}

.author{
font-size:13px;
opacity:.8;
margin-top:3px;
}

.sales{
font-size:12px;
opacity:.7;
margin-top:3px;
}

.price{
color:#22c55e;
margin-top:5px;
font-weight:bold;
}

.buttons{
margin-top:8px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.buy{
padding:6px 10px;
border:none;
background:#22c55e;
border-radius:6px;
color:white;
cursor:pointer;
}

.cart{
padding:6px 10px;
border:none;
background:#2563eb;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="menuLoad"></div>
<div id="headerLoad"></div>

<div class="hero">
<h1>CreatorHub Marketplace</h1>
<p>Sell • Buy • Earn From Digital Products</p>
</div>

<h2 style="padding:15px">All Books</h2>

<div id="products" class="products">
Loading...
</div>

<div id="footer"></div>

<script>

/* API */

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"


/* LOAD HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("headerLoad").innerHTML=data
loadProfile()
})


/* LOAD MENU */

fetch("menu.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("menuLoad").innerHTML=data
})


/* LOAD FOOTER */

fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data
})


/* PROFILE IMAGE */

function loadProfile(){

let user=JSON.parse(localStorage.getItem("user")||"{}")

let profileImg=localStorage.getItem("profile_"+(user.email||"guest"))

let profile=document.getElementById("profile")

if(profile){

profile.src=
profileImg||
"https://cdn-icons-png.flaticon.com/512/149/149071.png"

}

}


/* DRIVE IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w500"
}

}catch{}

return link

}


/* LOAD PRODUCTS */

async function loadProducts(){

try{

let res=await fetch(PRODUCT_API+"?db=products&t="+Date.now())

let products=await res.json()

if(!Array.isArray(products)){
products=[]
}

/* ONLY APPROVED */

let approved=products.filter(p=>p.status==="approved")

approved.reverse()

render(approved)

}catch(e){

console.log(e)

document.getElementById("products").innerHTML="Failed to load products"

}

}


/* RENDER PRODUCTS */

function render(list){

let box=document.getElementById("products")

if(!list.length){
box.innerHTML="No Books Available"
return
}

let html=""

list.forEach(p=>{

let author=p.author || p.owner || "Unknown"
let sales=Number(p.sales || 0)

html+=`

<div class="card" onclick="openDetails('${p.id}')">

<img src="${driveImage(p.image)}">

<div class="bookInfo">

<div class="bookTitle">${escapeHTML(p.title||"Untitled")}</div>

<div class="author">👤 ${escapeHTML(author)}</div>

<div class="sales">📈 ${sales}+ sales</div>

<div class="price">₹ ${p.price||0}</div>

<div class="buttons">

<button class="buy"
onclick="buyNow(event,'${p.id}')">
Buy
</button>

<button class="cart"
onclick="addCart(event,'${p.id}')">
Cart
</button>

</div>

</div>

</div>

`

})

box.innerHTML=html

}


/* DETAILS PAGE */

function openDetails(id){

location.href="ebook.html?id="+id

}


/* BUY */

function buyNow(e,id){

e.stopPropagation()

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}


/* CART */

function addCart(e,id){

e.stopPropagation()

let cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.includes(id)){
alert("Already added to cart")
return
}

cart.push(id)

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to Cart")

}


/* SECURITY */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}


/* INIT */

loadProducts()

/* AUTO REFRESH */

setInterval(loadProducts,20000)

</script>

</body>
</html>
