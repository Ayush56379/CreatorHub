<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background: radial-gradient(circle at top, #0d1b2a 0%, #000814 100%);
        color: white;
        font-family: 'Inter', sans-serif;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
      }
      .btn-primary {
        background: #22c55e;
        transition: transform 0.2s;
      }
      .btn-primary:hover { transform: scale(1.05); }
    </style>
  </head>
  <body>

    <nav class="flex items-center justify-between px-10 py-5 border-b border-gray-800">
      <div class="text-2xl font-bold text-green-500">CreatorHub</div>
      <ul class="flex gap-8 text-sm text-gray-300">
        <li>Home</li>
        <li>Categories</li>
        <li>Best Sellers</li>
        <li>Sell eBook</li>
      </ul>
      <div class="relative">
        <input type="text" placeholder="Search eBooks..." class="bg-gray-900 border border-gray-700 rounded-full px-4 py-1 text-sm outline-none">
      </div>
    </nav>

    <header class="text-center py-20 px-4">
      <h1 class="text-5xl font-extrabold mb-4">Discover, Buy & Sell eBooks<br>on <span class="text-green-500">CreatorHub</span></h1>
      <p class="text-gray-400 mb-8">Explore thousands of digital books from talented creators.</p>
      <div class="flex justify-center gap-4">
        <button class="btn-primary px-8 py-3 rounded-lg font-semibold">Browse eBooks</button>
        <button class="bg-gray-800 px-8 py-3 rounded-lg font-semibold border border-gray-700">Sell Your eBook</button>
      </div>
    </header>

    <section class="max-w-6xl mx-auto px-4 py-10">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">🔥 Trending eBooks</h2>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-6">
        <div class="glass-card p-4">
          <img src="https://via.placeholder.com/150x220" class="rounded-lg mb-4 w-full shadow-lg">
          <h3 class="font-bold text-sm">Atomic Habits</h3>
          <p class="text-xs text-gray-500 mb-2">James Clear</p>
          <div class="flex justify-between items-center">
            <span class="font-bold">₹199</span>
            <button class="bg-green-600 text-xs px-3 py-1 rounded">Buy Now</button>
          </div>
        </div>
        </div>
    </section>

  </body>
</html>
