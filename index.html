<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CreatorHub Marketplace – Buy & Sell eBooks</title>

<meta name="description" content="Buy and sell eBooks on CreatorHub marketplace. Discover best sellers and earn from your digital books.">

<style>

body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
}

/* HERO */

.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(135deg,#020617,#111827);
}

.hero h1{
color:#22c55e;
margin:0 0 10px;
}

.hero p{
opacity:.8;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* SECTION */

.section{
margin-top:40px;
}

.section h2{
margin-bottom:15px;
}

/* GRID */

.products{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

@media(min-width:600px){
.products{
grid-template-columns:1fr 1fr;
}
}

@media(min-width:900px){
.products{
grid-template-columns:repeat(4,1fr);
}
}

/* CARD */

.card{
background:#111827;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:.25s;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.card:hover{
transform:translateY(-6px);
}

.bookImage{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
}

.bookBody{
padding:12px;
display:flex;
flex-direction:column;
}

.bookTitle{
font-weight:600;
margin-bottom:5px;
}

.author{
font-size:13px;
opacity:.7;
}

.sales{
font-size:12px;
opacity:.7;
}

.price{
color:#22c55e;
font-weight:bold;
margin-top:6px;
}

.buttons{
display:flex;
gap:8px;
margin-top:10px;
}

.buy{
flex:1;
padding:8px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.cart{
flex:1;
padding:8px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="menuLoad"></div>
<div id="headerLoad"></div>

<section class="hero">

<h1>CreatorHub Marketplace – Sell • Buy • Earn</h1>

<p>Discover amazing eBooks from creators around the world</p>

</section>

<div class="container">

<section class="section">

<h2>🔥 Best Seller eBooks</h2>

<div id="bestSeller" class="products">
Loading...
</div>

</section>

<section class="section">

<h2>📚 All eBooks</h2>

<div id="products" class="products">
Loading...
</div>

</section>

</div>

<div id="footer"></div>

<script>

/* API */

const PRODUCT_API="https://script.google.com/macros/s/AKfycbzJOpw4PxupFHBXq4UfQq3m16CLV5SJE5o1m07_vuo8S56UYNFx1_rzqTcpFvqgAReZ/exec"


/* LOAD HEADER */

fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("headerLoad").innerHTML=data
loadProfile()
})


/* LOAD MENU */

fetch("menu.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("menuLoad").innerHTML=data
})


/* LOAD FOOTER */

fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data
})


/* PROFILE IMAGE */

function loadProfile(){

let user=JSON.parse(localStorage.getItem("user")||"{}")

let profileImg=localStorage.getItem("profile_"+(user.email||"guest"))

let profile=document.getElementById("profile")

if(profile){

profile.src=
profileImg||
"https://cdn-icons-png.flaticon.com/512/149/149071.png"

}

}


/* DRIVE IMAGE FIX */

function driveImage(link){

if(!link) return "https://picsum.photos/400"

try{

let id=""

if(link.includes("id=")){
id=link.split("id=")[1].split("&")[0]
}

if(link.includes("/file/d/")){
id=link.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://drive.google.com/thumbnail?id="+id+"&sz=w500"
}

}catch{}

return link

}


/* LOAD PRODUCTS */

async function loadProducts(){

try{

let res=await fetch(PRODUCT_API+"?db=products&t="+Date.now())

let products=await res.json()

if(!Array.isArray(products)){
products=[]
}

/* ONLY APPROVED */

let approved=products.filter(p=>p.status==="approved")

/* BEST SELLERS */

let best=[...approved]
.sort((a,b)=>(Number(b.sales)||0)-(Number(a.sales)||0))
.slice(0,4)

renderBest(best)

approved.reverse()

render(approved)

}catch(e){

console.log(e)

document.getElementById("products").innerHTML="Failed to load products"

}

}


/* BEST SELLER RENDER */

function renderBest(list){

let box=document.getElementById("bestSeller")

if(!list.length){
box.innerHTML="No Best Sellers Yet"
return
}

let html=""

list.forEach(p=>{

html+=cardHTML(p,false)

})

box.innerHTML=html

}


/* ALL PRODUCTS RENDER */

function render(list){

let box=document.getElementById("products")

if(!list.length){
box.innerHTML="No Books Available"
return
}

let html=""

list.forEach(p=>{

html+=cardHTML(p,true)

})

box.innerHTML=html

}


/* CARD TEMPLATE */

function cardHTML(p,buttons){

let author=p.author || p.owner || "Unknown"

let sales=Number(p.sales || 0)

let title=escapeHTML(p.title||"Untitled")

let price=p.price||0

let img=driveImage(p.image)

return `

<div class="card" onclick="openDetails('${p.id||""}')">

<img class="bookImage" src="${img}">

<div class="bookBody">

<div class="bookTitle">${title}</div>

<div class="author">👤 ${escapeHTML(author)}</div>

<div class="sales">📈 ${sales}+ sales</div>

<div class="price">₹ ${price}</div>

${buttons ? `

<div class="buttons">

<button class="buy"
onclick="buyNow(event,'${p.id}')">
Buy
</button>

<button class="cart"
onclick="addCart(event,'${p.id}')">
Cart
</button>

</div>

` : ``}

</div>

</div>

`

}


/* DETAILS */

function openDetails(id){

location.href="ebook.html?id="+id

}


/* BUY */

function buyNow(e,id){

e.stopPropagation()

localStorage.setItem("buyProduct",id)

location.href="payment.html"

}


/* CART */

function addCart(e,id){

e.stopPropagation()

let cart=JSON.parse(localStorage.getItem("cart")||"[]")

if(cart.includes(id)){
alert("Already added to cart")
return
}

cart.push(id)

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to Cart")

}


/* SECURITY */

function escapeHTML(str){

return String(str).replace(/[&<>"']/g,function(m){

return({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#039;'
})[m]

})

}


/* INIT */

loadProducts()

setInterval(loadProducts,20000)

</script>

</body>
</html>
